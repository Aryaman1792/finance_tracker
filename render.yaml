services:
  - type: web
    name: finance-tracker-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: finance-tracker-db
    plan: free
    databaseName: finance_tracker
    user: finance_admin
